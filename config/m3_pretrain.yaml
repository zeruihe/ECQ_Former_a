# config/m3_pretrain.yaml
# M3 第一阶段：预训练（图像描述任务）
# 训练后得到：m3_pretrain/checkpoints/   ← 预训练权重
#
# 训练顺序：
#   Stage 1 (本配置): train_m2_pretrain_caption_offline.py → m3_pretrain 权重
#   Stage 2 (m3.yaml): train_m2_finetune_vqa_offline.py  → m3_finetune_vqa 权重

models:
  llama_dir: /root/autodl-tmp/hf_models/TsinghuaC3I/Llama-3.1-8B-UltraMedical
  clip_dir: /root/autodl-tmp/hf_models/openai/clip-vit-large-patch14
  dinov2_dir: /root/autodl-tmp/hf_models/facebook/dinov2-large
  biomedclip_dir: /root/autodl-tmp/hf_models/microsoft/BiomedCLIP-PubMedBERT_256-vit_base_patch16_224

  enabled_encoders: [clip, biomedclip, dinov2]
  auto_m_queries: true    # 96

  d_bridge: 768
  meq_layers: 12
  meq_heads: 12

  # 第一个创新点参数（完整保留）
  attn_type: param_free
  phi: silu
  score_scale: true
  score_norm: false

  adaptive_drop:
    enabled: true
    gamma: 0.2
    mode: topk
    post: no_softmax

  # 第二个创新点：门控（预训练阶段以 prompt_prefix 为条件信号）
  gating:
    enabled: true
    mlp_ratio: 2
    dropout: 0.1
    encoder_drop_p: 0.1

  # 第二个创新点：FiLM 查询调制
  film:
    enabled: true
    dropout: 0.1

data:
  split: train
  return_pil: true
  pin_memory: true
  shuffle: true
  num_workers: 4
  batch_size: 1
  sources:
    - name: rocov2
      root: /root/autodl-tmp
      ann:
        train: /root/autodl-tmp/rocov2/caption_rocov2_train.json
        valid: /root/autodl-tmp/rocov2/caption_rocov2_val.json
        test:  /root/autodl-tmp/rocov2/caption_rocov2_test.json
      image_key: image
      text_key: caption
      id_key: image_id

    - name: mimic_cxr
      root: /root/autodl-tmp
      ann:
        train: /root/autodl-tmp/mimic_cxr/mimic_cxr_train.json
        valid: /root/autodl-tmp/mimic_cxr/mimic_cxr_val.json
        test:  /root/autodl-tmp/mimic_cxr/mimic_cxr_test.json
      image_key: image
      text_key: caption
      id_key: null

train:
  seed: 3407
  bf16: true
  fp16: false

  # 从 M1 预训练权重初始化（第一个创新点的桥接权重复用，M2新模块随机初始化）
  init_from: "/root/autodl-tmp/outputs/m2_cd_pertrain/checkpoints"

  lr: 1.0e-4
  weight_decay: 0.01
  grad_accum: 8
  num_epochs: 1

  max_length: 256
  prompt_prefix: "Describe the medical image:\n"

  log_every: 10
  save_every: 2000
  keep_last_k: 3
  save_latest: true
  auto_resume: true
  resume_from: null

eval:
  enabled: true
  max_batches: 100

output:
  out_dir: /root/autodl-tmp/outputs
  run_name: m3_pretrain
